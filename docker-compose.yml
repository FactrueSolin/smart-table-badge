services:
  htmlpush:
    build:
      context: .
      args:
        NPM_REGISTRY: ${NPM_REGISTRY:-https://registry.npmmirror.com}
    ports:
      - "43210:3000"
    environment:
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-changeme}
      - AI_BASE_URL=${AI_BASE_URL:-}
      - AI_MODEL=${AI_MODEL:-}
      - AI_API_KEY=${AI_API_KEY:-}
    volumes:
      - htmlpush-data:/app/data
    restart: unless-stopped

volumes:
  htmlpush-data:
