openapi: 3.0.3
info:
  title: HTMLPush API
  description: HTMLPush 是一个让手机浏览器变成"桌面显示器"的服务。后台上传/切换 HTML 内容，手机端通过 SSE 实时展示。
  version: 0.1.0

servers:
  - url: http://localhost:3000
    description: 本地开发环境

tags:
  - name: 页面管理
    description: HTML 页面的增删改查
  - name: 展示控制
    description: 当前展示页面的切换
  - name: 实时推送
    description: SSE 实时推送
  - name: 认证
    description: 管理后台认证

paths:
  /api/pages:
    get:
      tags: [页面管理]
      summary: 获取所有页面列表
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/PageInfo'
    post:
      tags: [页面管理]
      summary: 上传 HTML 文件
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                file:
                  type: string
                  format: binary
                  description: HTML 文件
                name:
                  type: string
                  description: 页面名称（可选，默认使用文件名）
              required: [file]
      responses:
        '201':
          description: 上传成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PageInfo'
        '400':
          description: 缺少文件

  /api/pages/{id}:
    get:
      tags: [页面管理]
      summary: 获取指定页面的 HTML 内容
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: 成功
          content:
            text/html:
              schema:
                type: string
        '404':
          description: 页面不存在
    delete:
      tags: [页面管理]
      summary: 删除指定页面
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: 删除成功
        '404':
          description: 页面不存在

  /api/current:
    get:
      tags: [展示控制]
      summary: 获取当前展示的页面信息
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  page:
                    $ref: '#/components/schemas/PageInfo'
                  content:
                    type: string
                    description: HTML 内容
    put:
      tags: [展示控制]
      summary: 切换当前展示的页面
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                pageId:
                  type: string
                  description: 要切换到的页面 ID
              required: [pageId]
      responses:
        '200':
          description: 切换成功
        '400':
          description: 缺少 pageId
        '404':
          description: 页面不存在

  /api/sse:
    get:
      tags: [实时推送]
      summary: SSE 实时推送端点
      description: 建立 SSE 连接，接收内容变更事件。手机端应长期保持此连接。
      responses:
        '200':
          description: SSE 连接成功
          content:
            text/event-stream:
              schema:
                type: string
                example: |
                  event: connected
                  data: {"clientId":"xxx"}

                  event: content-changed
                  data: {"action":"switch","pageId":"abc123","timestamp":1234567890}

  /api/auth/login:
    post:
      tags: [认证]
      summary: 管理后台登录
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                password:
                  type: string
                  description: 管理密码
              required: [password]
      responses:
        '200':
          description: 登录成功，设置 cookie
        '401':
          description: 密码错误

  /api/auth/logout:
    post:
      tags: [认证]
      summary: 退出登录
      responses:
        '200':
          description: 退出成功

  /api/auth/check:
    get:
      tags: [认证]
      summary: 检查认证状态
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  authenticated:
                    type: boolean

components:
  schemas:
    PageInfo:
      type: object
      properties:
        id:
          type: string
          description: 页面唯一 ID
        name:
          type: string
          description: 页面名称
        filename:
          type: string
          description: 存储的文件名
        uploadedAt:
          type: string
          format: date-time
          description: 上传时间
