openapi: 3.0.3
info:
  title: HTMLPush API
  description: HTMLPush 是一个让手机浏览器变成"桌面显示器"的服务。后台上传/切换 HTML 内容，手机端通过 SSE 实时展示。
  version: 0.1.0

servers:
  - url: http://localhost:3000
    description: 本地开发环境

tags:
  - name: 页面管理
    description: HTML 页面的增删改查
  - name: 图床管理
    description: 图片素材的上传、列表、重命名、删除与原图访问
  - name: 展示控制
    description: 当前展示页面的切换
  - name: 实时推送
    description: SSE 实时推送
  - name: 认证
    description: 管理后台认证

paths:
  /api/images:
    get:
      tags: [图床管理]
      summary: 获取图片列表
      parameters:
        - name: sort
          in: query
          required: false
          schema:
            type: string
            enum: [uploadedAt-desc, uploadedAt-asc]
            default: uploadedAt-desc
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ImageAsset'
    post:
      tags: [图床管理]
      summary: 上传图片并生成展示页
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                file:
                  type: string
                  format: binary
                name:
                  type: string
                  description: 图片名称
              required: [file]
      responses:
        '201':
          description: 上传成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ImageUploadResponse'
        '400':
          description: 缺少文件
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '413':
          description: 文件过大
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '415':
          description: 文件类型不支持
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    delete:
      tags: [图床管理]
      summary: 批量删除图片
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ImageBatchDeleteRequest'
      responses:
        '200':
          description: 删除成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  deletedIds:
                    type: array
                    items:
                      type: string
        '400':
          description: 请求参数错误
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/images/{id}:
    get:
      tags: [图床管理]
      summary: 获取原始图片内容
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: 成功
          content:
            image/*:
              schema:
                type: string
                format: binary
        '404':
          description: 图片不存在
    patch:
      tags: [图床管理]
      summary: 重命名图片
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ImageRenameRequest'
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ImageAsset'
        '400':
          description: 请求参数错误
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: 图片不存在
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    delete:
      tags: [图床管理]
      summary: 删除单张图片
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: 删除成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  deleted:
                    type: boolean
                  id:
                    type: string
        '404':
          description: 图片不存在
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/pages:
    get:
      tags: [页面管理]
      summary: 获取所有页面列表
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/PageInfo'
    post:
      tags: [页面管理]
      summary: 上传 HTML 文件
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                file:
                  type: string
                  format: binary
                  description: HTML 文件
                name:
                  type: string
                  description: 页面名称（可选，默认使用文件名）
              required: [file]
      responses:
        '201':
          description: 上传成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PageInfo'
        '400':
          description: 缺少文件

  /api/pages/{id}:
    get:
      tags: [页面管理]
      summary: 获取指定页面的 HTML 内容
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: 成功
          content:
            text/html:
              schema:
                type: string
        '404':
          description: 页面不存在
    delete:
      tags: [页面管理]
      summary: 删除指定页面
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: 删除成功
        '404':
          description: 页面不存在

  /api/current:
    get:
      tags: [展示控制]
      summary: 获取当前展示的页面信息
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  page:
                    $ref: '#/components/schemas/PageInfo'
                  content:
                    type: string
                    description: HTML 内容
    put:
      tags: [展示控制]
      summary: 切换当前展示的页面
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                pageId:
                  type: string
                  description: 要切换到的页面 ID
              required: [pageId]
      responses:
        '200':
          description: 切换成功
        '400':
          description: 缺少 pageId
        '404':
          description: 页面不存在

  /api/sse:
    get:
      tags: [实时推送]
      summary: SSE 实时推送端点
      description: 建立 SSE 连接，接收内容变更事件。手机端应长期保持此连接。
      responses:
        '200':
          description: SSE 连接成功
          content:
            text/event-stream:
              schema:
                type: string
                example: |
                  event: connected
                  data: {"clientId":"xxx"}

                  event: content-changed
                  data: {"action":"switch","pageId":"abc123","timestamp":1234567890}

  /api/auth/login:
    post:
      tags: [认证]
      summary: 管理后台登录
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                password:
                  type: string
                  description: 管理密码
              required: [password]
      responses:
        '200':
          description: 登录成功，设置 cookie
        '401':
          description: 密码错误

  /api/auth/logout:
    post:
      tags: [认证]
      summary: 退出登录
      responses:
        '200':
          description: 退出成功

  /api/auth/check:
    get:
      tags: [认证]
      summary: 检查认证状态
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  authenticated:
                    type: boolean

components:
  schemas:
    PageInfo:
      type: object
      properties:
        id:
          type: string
          description: 页面唯一 ID
        name:
          type: string
          description: 页面名称
        filename:
          type: string
          description: 存储的文件名
        uploadedAt:
          type: string
          format: date-time
          description: 上传时间
    ImageAsset:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        filename:
          type: string
        mimeType:
          type: string
        size:
          type: integer
        uploadedAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        pageId:
          type: string
          nullable: true
        imageUrl:
          type: string
        pageUrl:
          type: string
          nullable: true
    ImageUploadResponse:
      type: object
      properties:
        image:
          $ref: '#/components/schemas/ImageAsset'
        page:
          $ref: '#/components/schemas/PageInfo'
    ImageRenameRequest:
      type: object
      properties:
        name:
          type: string
      required: [name]
    ImageBatchDeleteRequest:
      type: object
      properties:
        ids:
          type: array
          items:
            type: string
      required: [ids]
    ErrorResponse:
      type: object
      properties:
        error:
          type: string
